<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU</title>
<style>
  :root{
    --bg:#faf6ee;
    --card:#f3ecdf;
    --gold:#3a2e22;
    --text:#2b2018;
    --muted:#7a6a55;
    --line:#e3d9c4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:30px 20px 60px;}
  .title{
    text-align:center;
    font-size:54px;
    font-weight:900;
    letter-spacing:4px;
    margin:10px 0 30px;
    color:var(--text);
    text-shadow:0 2px 6px rgba(0,0,0,.08);
  }
  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:35px;
  }
  .tab-btn{
    background:var(--card);
    border:1px solid var(--line);
    color:var(--muted);
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    letter-spacing:.5px;
    transition:.25s;
  }
  .tab-btn:hover{color:var(--gold);border-color:var(--gold);}
  .tab-btn.active{background:var(--gold);color:#ffffff;border-color:var(--gold);}

  .category{display:none;}
  .category.active{display:block;animation:fade .3s;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .cat-title{
    font-size:24px;
    letter-spacing:2px;
    color:var(--gold);
    border-bottom:2px solid var(--line);
    padding-bottom:8px;
    margin:35px 0 18px;
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:14px;
  }
  .item{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
  }
  .icon{
    width:56px;height:56px;
    flex:0 0 56px;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;
    background:#ecdfc6;
    border-radius:50%;
    border:1px solid var(--line);
    overflow:hidden;
  }
  .icon img{
    width:100%;height:100%;
    object-fit:cover;
  }
  .info{flex:1;display:flex;flex-direction:column;}
  .name{font-weight:700;font-size:15px;}
  .price{color:var(--gold);font-weight:800;font-size:15px;white-space:nowrap;}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .sizes{display:flex;gap:10px;font-size:13px;color:var(--gold);font-weight:700;}
  footer{
    text-align:center;
    margin-top:50px;
    letter-spacing:4px;
    font-size:22px;
    font-weight:900;
    color:var(--text);
    border-top:1px solid var(--line);
    padding-top:25px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">MENU</div>

  <div class="tabs" id="tabs"></div>
  <div id="categories"></div>

  <footer></footer>
</div>

<script>
function slugify(text){
  const trMap = {'ç':'c','Ç':'c','ğ':'g','Ğ':'g','ı':'i','İ':'i','ö':'o','Ö':'o','ş':'s','Ş':'s','ü':'u','Ü':'u'};
  return text.split('').map(ch => trMap[ch] || ch).join('')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
}

// Görseller images/ klasöründen okunur
function photoFor(name){
  return `images/${slugify(name)}.png`;
}

const data = [
  {
    cat:"Coffee",
    sizes:["8 OZ","14 OZ"],
    items:[
      ["Espresso",100,150],
      ["Americano",150,170],
      ["Filter Coffee",160,170],
      ["Latte",160,180],
      ["Cappuccino",160,180],
      ["Caramel Latte",180,200],
      ["Pecan & Almond",180,200],
      ["Mocha",180,200],
      ["White Mocha",180,200],
      ["Irish Cream",180,200],
      ["Vanilla Cream",180,200],
      ["Cookie Latte",180,200],
    ]
  },
  {
    cat:"Soğuk Kahveler",
    items:[
      ["Ice Americano",180],
      ["Ice Filter Coffee",180],
      ["Ice Latte",200],
      ["Ice Mocha",220],
      ["Ice White Mocha",220],
      ["Ice Cookie",220],
      ["Ice Irish Cream",220],
      ["Ice Latte Pistachio",250],
      ["Ice Matcha Latte",250],
    ]
  },
  {
    cat:"Bubble Tea",
    items:[
      ["Coffee & Caramel",250],
      ["Strawberry",220],
      ["Blueberry",220],
      ["Energic Bubbles",280],
    ]
  },
  {
    cat:"Fresh Drinks",
    items:[
      ["Cool Lime",200],
      ["Berry Hibiscus",200],
      ["Pink Pitaya",200],
      ["Icecream Milkshake",250],
      ["Limonata",100],
      ["Taze Sıkılmış Portakal Suyu",100],
    ]
  },
  {
    cat:"Milkshake",
    items:[
      ["Milkshake (Buzlu)",250],
      ["Milkshake (Buzsuz)",230],
    ]
  },
  {
    cat:"Meşrubatlar",
    items:[
      ["Coca Cola",100],
      ["Şişe Kola",80],
      ["Şişe Fanta",80],
      ["Ice Tea",100],
      ["Meyve Suyu Kutu",100],
      ["Meyve Suyu Pipetli",40],
      ["Sade Soda",30],
      ["Churchill",80],
      ["Redbull",100],
      ["Su",20],
    ]
  },
  {
    cat:"Sıcak İçecekler",
    items:[
      ["Türk Kahvesi",80],
      ["Nescafe Sade",80],
      ["Nescafe Sütlü",100],
      ["Sıcak Çikolata",180],
      ["Salep",150],
      ["Çay",30],
      ["Fincan Çay",50],
    ]
  },
  {
    cat:"Poğaça",
    items:[
      ["Kıymalı Poğaça",25],
      ["Peynirli Poğaça",25],
      ["Patatesli Poğaça",25],
      ["Zeytinli Poğaça",25],
      ["Sade Poğaça",25]
    ]
  },
  {
    cat:"Simit",
    items:[
      ["Simit",25]
    ]
  },
  {
    cat:"Açma",
    items:[
      ["Açma",25]
    ]
  },
  {
    cat:"Börekler (Porsiyon)",
    items:[
      ["Kıymalı Kol (200gr)",180],
      ["Su Böreği (220gr)",180],
      ["Küt Böreği (220gr)",150],
      ["Peynirli Kol (220gr)",160],
      ["Patatesli Kol (220gr)",160],
    ]
  },
  {
    cat:"Börekler (KG)",
    items:[
      ["Kıymalı",750],
      ["Su Böreği",650],
      ["Küt Böreği",550],
      ["Diğer Kol Börekleri",600],
    ]
  },
  {
    cat:"Atıştırmalık",
    items:[
      ["Tost",250],
      ["Sandwich",190],
    ]
  },
  {
    cat:"Tatlı",
    items:[
      ["Magnolia", 150],
      ["Kurabiye (KG)",250]
    ]
  },
];

const tabsEl = document.getElementById("tabs");
const catEl = document.getElementById("categories");

data.forEach((c, idx) => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (idx===0 ? " active" : "");
  btn.textContent = c.cat;
  btn.onclick = () => showCat(idx);
  tabsEl.appendChild(btn);

  const section = document.createElement("div");
  section.className = "category" + (idx===0 ? " active" : "");
  section.id = "cat-"+idx;

  let html = `<div class="cat-title">${c.cat}</div><div class="grid">`;
  c.items.forEach((it, i) => {
    const name = it[0];
    const imgUrl = photoFor(name);
    
    // Görsel klasörde yoksa alanı temiz/boş tutan hata koruması
    const imgTag = `<img src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.style.opacity='0';">`;
    
    if(c.sizes){
      html += `
      <div class="item">
        <div class="icon">${imgTag}</div>
        <div class="info">
          <div class="row"><span class="name">${name}</span>
          <span class="sizes">${it[1]}₺ / ${it[2]}₺</span></div>
          <div class="sub">${c.sizes[0]} - ${c.sizes[1]}</div>
        </div>
      </div>`;
    } else {
      html += `
      <div class="item">
        <div class="icon">${imgTag}</div>
        <div class="info">
          <div class="row"><span class="name">${name}</span>
          <span class="price">${it[1]}₺</span></div>
        </div>
      </div>`;
    }
  });
  html += `</div>`;
  section.innerHTML = html;
  catEl.appendChild(section);
});

function showCat(idx){
  document.querySelectorAll(".category").forEach((el,i)=>el.classList.toggle("active", i===idx));
  document.querySelectorAll(".tab-btn").forEach((el,i)=>el.classList.toggle("active", i===idx));
}
</script>
</body>
</html>
