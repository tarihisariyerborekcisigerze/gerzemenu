<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU</title>
<style>
:root{
--bg:#faf6ee;
--card:#f3ecdf;
--gold:#3a2e22;
--text:#2b2018;
--muted:#7a6a55;
--line:#e3d9c4;
}
*{box-sizing:border-box;}
body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Trebuchet MS','Segoe UI',sans-serif;
}
.wrap{max-width:1100px;margin:0 auto;padding:30px 20px 60px;}
.title{
text-align:center;
font-size:54px;
font-weight:900;
letter-spacing:4px;
margin:10px 0 30px;
color:var(--text);
text-shadow:0 2px 6px rgba(0,0,0,.08);
}
.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:35px;
}
.tab-btn{
background:var(--card);
border:1px solid var(--line);
color:var(--muted);
padding:10px 18px;
border-radius:30px;
cursor:pointer;
font-size:14px;
font-weight:600;
letter-spacing:.5px;
transition:.25s;
}
.tab-btn:hover{color:var(--gold);border-color:var(--gold);}
.tab-btn.active{background:var(--gold);color:#ffffff;border-color:var(--gold);}

.category{display:none;}
.category.active{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.cat-title{
font-size:24px;
letter-spacing:2px;
color:var(--gold);
border-bottom:2px solid var(--line);
padding-bottom:8px;
margin:35px 0 18px;
text-transform:uppercase;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:14px;
}
.item{
display:flex;
align-items:center;
gap:14px;
background:var(--card);
border:1px solid var(--line);
border-radius:12px;
padding:12px 14px;
}
.icon{
width:56px;height:56px;
flex:0 0 56px;
display:flex;align-items:center;justify-content:center;
font-size:24px;
background:#ecdfc6;
border-radius:50%;
border:1px solid var(--line);
overflow:hidden;
}
.icon img{
width:100%;height:100%;
object-fit:cover;
}
.info{flex:1;display:flex;flex-direction:column;}
.name{font-weight:700;font-size:15px;}
.price{color:var(--gold);font-weight:800;font-size:15px;white-space:nowrap;}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.sub{font-size:11px;color:var(--muted);margin-top:2px;}
.allergen-badges{
display:inline-flex;
gap:4px;
margin-left:6px;
vertical-align:middle;
}
.allergen-badge{
display:inline-flex;
align-items:center;
justify-content:center;
width:18px;height:18px;
font-size:11px;
border-radius:50%;
background:#f0d7a8;
border:1px solid #d9b876;
}
.click-hint{
font-size:10px;
color:var(--muted);
font-style:italic;
margin-top:3px;
display:flex;
align-items:center;
gap:4px;
}
.click-hint .info-dot{
display:inline-flex;
align-items:center;
justify-content:center;
width:13px;height:13px;
border-radius:50%;
background:var(--gold);
color:#fff;
font-size:9px;
font-weight:700;
font-style:normal;
flex:0 0 auto;
}
.sizes{display:flex;gap:10px;font-size:13px;color:var(--gold);font-weight:700;}
footer{
text-align:center;
margin-top:50px;
letter-spacing:4px;
font-size:22px;
font-weight:900;
color:var(--text);
border-top:1px solid var(--line);
padding-top:25px;
}
.item{cursor:pointer;transition:.2s;}
.item:hover{border-color:var(--gold);transform:translateY(-2px);}

.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(43,32,24,.55);
z-index:999;
align-items:center;
justify-content:center;
padding:20px;
}
.modal-overlay.active{display:flex;}
.modal-box{
background:var(--bg);
border-radius:16px;
max-width:380px;
width:100%;
padding:24px;
position:relative;
box-shadow:0 12px 40px rgba(0,0,0,.25);
border:1px solid var(--line);
}
.modal-close{
position:absolute;
top:12px;right:14px;
background:none;
border:none;
font-size:22px;
color:var(--muted);
cursor:pointer;
line-height:1;
}
.modal-close:hover{color:var(--gold);}
.modal-icon{
width:90px;height:90px;
border-radius:50%;
margin:0 auto 14px;
background:#ecdfc6;
border:1px solid var(--line);
overflow:hidden;
display:flex;align-items:center;justify-content:center;
}
.modal-icon img{width:100%;height:100%;object-fit:cover;}
.modal-name{
text-align:center;
font-size:20px;
font-weight:800;
margin-bottom:4px;
}
.modal-price{
text-align:center;
color:var(--gold);
font-weight:700;
margin-bottom:18px;
}
.modal-section{
margin-bottom:12px;
padding:12px 14px;
background:var(--card);
border:1px solid var(--line);
border-radius:10px;
}
.modal-section .label{
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
color:var(--muted);
font-weight:700;
margin-bottom:4px;
}
.modal-section .value{
font-size:14px;
color:var(--text);
font-weight:600;
}
</style>
</head>
<body>
<div class="wrap">
<div class="title">MENU</div>

<div class="tabs" id="tabs"></div>
<div id="categories"></div>

<footer></footer>
</div>

<div class="modal-overlay" id="modalOverlay">
<div class="modal-box">
<button class="modal-close" id="modalClose">&times;</button>
<div class="modal-icon" id="modalIcon"></div>
<div class="modal-name" id="modalName"></div>
<div class="modal-price" id="modalPrice"></div>
<div class="modal-section">
<div class="label">Kalori</div>
<div class="value" id="modalKcal"></div>
</div>
<div class="modal-section">
<div class="label">Gluten</div>
<div class="value" id="modalGluten"></div>
</div>
<div class="modal-section">
<div class="label">Alerjenler</div>
<div class="value" id="modalAllergens"></div>
</div>
</div>
</div>

<script>
function slugify(text){
const trMap = {'ç':'c','Ç':'c','ğ':'g','Ğ':'g','ı':'i','İ':'i','ö':'o','Ö':'o','ş':'s','Ş':'s','ü':'u','Ü':'u'};
return text.split('').map(ch => trMap[ch] || ch).join('')
.toLowerCase()
.replace(/[^a-z0-9]+/g,'-')
.replace(/^-+|-+$/g,'');
}

// Görseller images/ klasöründen okunur
function photoFor(name){
return `images/${slugify(name)}.png`;
}

// Her ürün için varsayılan beslenme/alerjen bilgisi.
// "kcal" = tahmini kalori (8oz/küçük porsiyon için), "gluten" ve "allergens" elle düzenlenebilir.
// Gerçek değerleri kendi ürünlerinize göre güncelleyin.
const DEFAULT_INFO = { kcal:"—", gluten:"Belirtilmemiş", allergens:"Belirtilmemiş" };

const INFO = {
"Espresso":{kcal:5,gluten:"Yok",allergens:"Yok"},
"Americano":{kcal:10,gluten:"Yok",allergens:"Yok"},
"Filter Coffee":{kcal:5,gluten:"Yok",allergens:"Yok"},
"Latte":{kcal:120,gluten:"Yok",allergens:"Süt"},
"Cappuccino":{kcal:110,gluten:"Yok",allergens:"Süt"},
"Caramel Latte":{kcal:220,gluten:"Yok",allergens:"Süt"},
"Mocha":{kcal:230,gluten:"Yok",allergens:"Süt, Kakao"},
"White Mocha":{kcal:240,gluten:"Yok",allergens:"Süt, Kakao"},
"Irish Cream":{kcal:230,gluten:"Yok",allergens:"Süt"},
"Vanilla Cream":{kcal:220,gluten:"Yok",allergens:"Süt"},
"Cookie Latte":{kcal:250,gluten:"İçerir (kurabiye aroması)",allergens:"Süt, Gluten"},
"Ice Americano":{kcal:10,gluten:"Yok",allergens:"Yok"},
"Ice Filter Coffee":{kcal:10,gluten:"Yok",allergens:"Yok"},
"Ice Latte":{kcal:130,gluten:"Yok",allergens:"Süt"},
"Ice Mocha":{kcal:240,gluten:"Yok",allergens:"Süt, Kakao"},
"Ice White Mocha":{kcal:250,gluten:"Yok",allergens:"Süt, Kakao"},
"Ice Cookie":{kcal:260,gluten:"İçerir (kurabiye aroması)",allergens:"Süt, Gluten"},
"Ice Irish Cream":{kcal:240,gluten:"Yok",allergens:"Süt"},
"Coffee & Caramel":{kcal:280,gluten:"Yok",allergens:"Süt"},
"Strawberry":{kcal:230,gluten:"Yok",allergens:"Yok"},
"Blueberry":{kcal:230,gluten:"Yok",allergens:"Yok"},
"Cool Lime":{kcal:150,gluten:"Yok",allergens:"Yok"},
"Berry Hibiscus":{kcal:150,gluten:"Yok",allergens:"Yok"},
"Icecream Milkshake":{kcal:320,gluten:"Yok",allergens:"Süt"},
"Limonata":{kcal:90,gluten:"Yok",allergens:"Yok"},
"Taze Sıkılmış Portakal Suyu":{kcal:110,gluten:"Yok",allergens:"Yok"},
"Coca Cola":{kcal:140,gluten:"Yok",allergens:"Yok"},
"Şişe Kola":{kcal:140,gluten:"Yok",allergens:"Yok"},
"Şişe Fanta":{kcal:150,gluten:"Yok",allergens:"Yok"},
"Ice Tea":{kcal:90,gluten:"Yok",allergens:"Yok"},
"Meyve Suyu Kutu":{kcal:120,gluten:"Yok",allergens:"Yok"},
"Meyve Suyu Pipetli":{kcal:60,gluten:"Yok",allergens:"Yok"},
"Sade Soda":{kcal:0,gluten:"Yok",allergens:"Yok"},
"Churchill":{kcal:60,gluten:"Yok",allergens:"Yok"},
"Redbull":{kcal:115,gluten:"Yok",allergens:"Yok"},
"Su":{kcal:0,gluten:"Yok",allergens:"Yok"},
"Türk Kahvesi":{kcal:10,gluten:"Yok",allergens:"Yok"},
"Nescafe Sade":{kcal:10,gluten:"Yok",allergens:"Yok"},
"Nescafe Sütlü":{kcal:90,gluten:"Yok",allergens:"Süt"},
"Sıcak Çikolata":{kcal:250,gluten:"Yok",allergens:"Süt, Kakao"},
"Salep":{kcal:200,gluten:"Yok",allergens:"Süt"},
"Çay":{kcal:5,gluten:"Yok",allergens:"Yok"},
"Fincan Çay":{kcal:5,gluten:"Yok",allergens:"Yok"},
"Kıymalı Poğaça":{kcal:220,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Peynirli Poğaça":{kcal:220,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Patatesli Poğaça":{kcal:210,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Zeytinli Poğaça":{kcal:210,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Sade Poğaça":{kcal:200,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Simit":{kcal:280,gluten:"İçerir",allergens:"Gluten, Susam"},
"Açma":{kcal:260,gluten:"İçerir",allergens:"Gluten, Süt, Yumurta"},
"Kıymalı Kol (200gr)":{kcal:480,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Su Böreği (220gr)":{kcal:520,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Küt Böreği (220gr)":{kcal:450,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Peynirli Kol (220gr)":{kcal:470,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Patatesli Kol (220gr)":{kcal:440,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Kıymalı":{kcal:480,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Diğer Kol Börekleri":{kcal:460,gluten:"İçerir",allergens:"Gluten, Yumurta, Süt"},
"Tost":{kcal:380,gluten:"İçerir",allergens:"Gluten, Süt"},
"Sandwich":{kcal:350,gluten:"İçerir",allergens:"Gluten, Süt, Yumurta"},
"Magnolia":{kcal:300,gluten:"İçerir",allergens:"Gluten, Süt, Yumurta"},
"Kurabiye (KG)":{kcal:480,gluten:"İçerir",allergens:"Gluten, Süt, Yumurta"},
};

function infoFor(name){
return INFO[name] || DEFAULT_INFO;
}

// Alerjen metninden küçük ikon rozetleri üretir
const ALLERGEN_ICONS = [
{key:"Gluten", icon:"🌾", title:"Gluten / Buğday"},
{key:"Süt", icon:"🥛", title:"Süt"},
{key:"Yumurta", icon:"🥚", title:"Yumurta"},
{key:"Kakao", icon:"🍫", title:"Kakao"},
{key:"Susam", icon:"🟤", title:"Susam"},
];

function badgesFor(allergens){
if(!allergens || allergens === "Yok" || allergens === "Belirtilmemiş") return "";
let html = `<span class="allergen-badges">`;
ALLERGEN_ICONS.forEach(a => {
if(allergens.includes(a.key)){
html += `<span class="allergen-badge" title="${a.title}">${a.icon}</span>`;
}
});
html += `</span>`;
return html;
}

const data = [
{
cat:"Coffee",
sizes:["8 OZ","14 OZ"],
items:[
["Espresso",100,150],
["Americano",150,170],
["Filter Coffee",160,170],
["Latte",160,180],
["Cappuccino",160,180],
["Caramel Latte",180,200],
["Mocha",180,200],
["White Mocha",180,200],
["Irish Cream",180,200],
["Vanilla Cream",180,200],
["Cookie Latte",180,200],
]
},
{
cat:"Soğuk Kahveler",
items:[
["Ice Americano",180],
["Ice Filter Coffee",180],
["Ice Latte",200],
["Ice Mocha",220],
["Ice White Mocha",220],
["Ice Cookie",220],
["Ice Irish Cream",220],
]
},
{
cat:"Bubble Tea",
items:[
["Coffee & Caramel",250],
["Strawberry",220],
["Blueberry",220],
]
},
{
cat:"Fresh Drinks",
items:[
["Cool Lime",200],
["Berry Hibiscus",200],
["Icecream Milkshake",250],
["Limonata",100],
["Taze Sıkılmış Portakal Suyu",100],
]
},

{
cat:"Meşrubatlar",
items:[
["Coca Cola",100],
["Şişe Kola",80],
["Şişe Fanta",80],
["Ice Tea",100],
["Meyve Suyu Kutu",100],
["Meyve Suyu Pipetli",40],
["Sade Soda",30],
["Churchill",80],
["Redbull",100],
["Su",20],
]
},
{
cat:"Sıcak İçecekler",
items:[
["Türk Kahvesi",80],
["Nescafe Sade",80],
["Nescafe Sütlü",100],
["Sıcak Çikolata",180],
["Salep",150],
["Çay",30],
["Fincan Çay",50],
]
},
{
cat:"Poğaça",
items:[
["Kıymalı Poğaça",25],
["Peynirli Poğaça",25],
["Patatesli Poğaça",25],
["Zeytinli Poğaça",25],
["Sade Poğaça",25]
]
},
{
cat:"Simit",
items:[
["Simit",25]
]
},
{
cat:"Açma",
items:[
["Açma",25]
]
},
{
cat:"Börekler (Porsiyon)",
items:[
["Kıymalı Kol (200gr)",180],
["Su Böreği (220gr)",180],
["Küt Böreği (220gr)",150],
["Peynirli Kol (220gr)",160],
["Patatesli Kol (220gr)",160],
]
},
{
cat:"Börekler (KG)",
items:[
["Kıymalı",750],
["Su Böreği",650],
["Küt Böreği",550],
["Diğer Kol Börekleri",600],
]
},
{
cat:"Atıştırmalık",
items:[
["Tost",250],
["Sandwich",190],
]
},
{
cat:"Tatlı",
items:[
["Magnolia", 150],
["Kurabiye (KG)",250]
]
},
];

const tabsEl = document.getElementById("tabs");
const catEl = document.getElementById("categories");

data.forEach((c, idx) => {
const btn = document.createElement("button");
btn.className = "tab-btn" + (idx===0 ? " active" : "");
btn.textContent = c.cat;
btn.onclick = () => showCat(idx);
tabsEl.appendChild(btn);

const section = document.createElement("div");
section.className = "category" + (idx===0 ? " active" : "");
section.id = "cat-"+idx;

let html = `<div class="cat-title">${c.cat}</div><div class="grid">`;
c.items.forEach((it, i) => {
const name = it[0];
const imgUrl = photoFor(name);
const info = infoFor(name);

// Görsel klasörde yoksa alanı temiz/boş tutan hata koruması
const imgTag = `<img src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.style.opacity='0';">`;

const dataAttrs = `data-name="${name}" data-img="${imgUrl}" data-kcal="${info.kcal}" data-gluten="${info.gluten}" data-allergens="${info.allergens}"`;

if(c.sizes){
const priceStr = `${it[1]}₺ / ${it[2]}₺`;
html += `
     <div class="item" ${dataAttrs} data-price="${priceStr} (${c.sizes[0]} - ${c.sizes[1]})">
       <div class="icon">${imgTag}</div>
       <div class="info">
         <div class="row"><span class="name">${name}${badgesFor(info.allergens)}</span>
         <span class="sizes">${it[1]}₺ / ${it[2]}₺</span></div>
         <div class="sub">${c.sizes[0]} - ${c.sizes[1]}</div>
         <div class="click-hint"><span class="info-dot">i</span>Detaylı bilgi için tıklayınız</div>
       </div>
     </div>`;
} else {
html += `
     <div class="item" ${dataAttrs} data-price="${it[1]}₺">
       <div class="icon">${imgTag}</div>
       <div class="info">
         <div class="row"><span class="name">${name}${badgesFor(info.allergens)}</span>
         <span class="price">${it[1]}₺</span></div>
         <div class="click-hint"><span class="info-dot">i</span>Detaylı bilgi için tıklayınız</div>
       </div>
     </div>`;
}
});
html += `</div>`;
section.innerHTML = html;
catEl.appendChild(section);
});

function showCat(idx){
document.querySelectorAll(".category").forEach((el,i)=>el.classList.toggle("active", i===idx));
document.querySelectorAll(".tab-btn").forEach((el,i)=>el.classList.toggle("active", i===idx));
}

// --- Modal: Alerjen / Gluten / Kalori bilgisi ---
const modalOverlay = document.getElementById("modalOverlay");
const modalIcon = document.getElementById("modalIcon");
const modalName = document.getElementById("modalName");
const modalPrice = document.getElementById("modalPrice");
const modalKcal = document.getElementById("modalKcal");
const modalGluten = document.getElementById("modalGluten");
const modalAllergens = document.getElementById("modalAllergens");

document.getElementById("categories").addEventListener("click", function(e){
const item = e.target.closest(".item");
if(!item) return;

modalName.textContent = item.dataset.name;
modalPrice.textContent = item.dataset.price;
modalIcon.innerHTML = `<img src="${item.dataset.img}" alt="${item.dataset.name}" onerror="this.style.opacity='0';">`;
modalKcal.textContent = (item.dataset.kcal === "—" || item.dataset.kcal === "0") ? (item.dataset.kcal === "0" ? "0 kcal" : "Belirtilmemiş") : `${item.dataset.kcal} kcal (yaklaşık)`;
modalGluten.textContent = item.dataset.gluten;
modalAllergens.textContent = item.dataset.allergens;

modalOverlay.classList.add("active");
});

function closeModal(){ modalOverlay.classList.remove("active"); }
document.getElementById("modalClose").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", function(e){
if(e.target === modalOverlay) closeModal();
});
document.addEventListener("keydown", function(e){
if(e.key === "Escape") closeModal();
});
</script>
</body>
</html>
</html>
